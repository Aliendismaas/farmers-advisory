{% extends "advisor/base.html" %}
{% load i18n %}
{% block title %}{% trans "Password updated" %} — FarmWise{% endblock %}
{% block content %}
<div class="card" style="max-width:480px; margin:0 auto; text-align:center; padding:40px 32px;">
  <div style="width:64px; height:64px; background:#D1FAE5; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#065F46" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h1 style="font-size:1.5rem; font-weight:800; margin-bottom:8px;">{% trans "Password updated" %}</h1>
  <p style="color:var(--gray-500); margin-bottom:24px;">{% trans "Your password has been set. You can now log in with your new password." %}</p>
  <a class="btn btn-primary" href="{% url 'advisor:login' %}">{% trans "Log in" %}</a>
</div>
{% endblock %}
