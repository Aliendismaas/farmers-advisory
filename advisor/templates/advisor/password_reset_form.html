{% extends "advisor/base.html" %}
{% load i18n %}
{% block title %}{% trans "Reset Password" %} — FarmWise{% endblock %}
{% block content %}
<div class="card" style="max-width:480px; margin:0 auto;">
  <h1 style="font-size:1.5rem; font-weight:800; margin-bottom:8px;">{% trans "Reset password" %}</h1>
  <p style="color:var(--gray-500); margin-bottom:24px;">{% trans "Enter your email address and we'll send you reset instructions." %}</p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">{% trans "Email me instructions" %}</button>
  </form>
</div>
{% endblock %}
